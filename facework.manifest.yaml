protocol_version: "1.2.0"

project:
  name: "Example Cultural Brand"
  domain: "creator-commerce"
  stage: "mvp"
  evidence_level: "validated"
  track: "agency_studio"

inputs:
  hunch: "Turn cultural momentum into owned creator commerce infrastructure."
  audience_context: "Independent creators with active communities and strong identity."
  constraints:
    time_weeks: 6
    budget_usd: 10000

artifacts:
  signal_thesis: "artifacts/signal-thesis.md"
  audience_field_map: "artifacts/audience-field-map.md"
  taste_contract: "artifacts/taste-contract.md"
  decision_ledger: "artifacts/decision-ledger.md"
  wedge_spec: "artifacts/wedge-spec.md"
  system_architecture: "artifacts/system-architecture.md"
  workflow_playbooks: "artifacts/workflow-playbooks.md"
  launch_plan: "artifacts/launch-plan.md"
  sovereignty_map: "artifacts/sovereignty-map.md"
  diagnostic_report: "artifacts/diagnostic-report.md"

gates:
  semantics: "pass"
  field: "pass"
  taste: "pass"
  strategy: "pass"
  architecture: "pass"
  launch: "pass"
  sovereignty: "pass"
  diagnostic: "pass"

compliance:
  signal_integrity: 15
  taste_fidelity: 15
  system_coherence: 15
  operational_readiness: 15
  infrastructure_sovereignty: 15
  total: 75
  level: "L3 Launch-Ready"

# v1.1.0: Runtime Ports — four manifest paths a runtime ingests to operate the tenant world.
# Conformance per evidence_level: Validated MUST emit all four; Signaled SHOULD; Thesis MAY emit
# a minimal SkillManifest only. See PROTOCOL.md §9 and RUNTIME-PORTS-PLAN.md for detail.
#
# CANONICAL CONVENTION: a real tenant's port manifests live at `define/*.yaml`. The Facework
# toolkit repo itself is NOT a Facework tenant project (it's the protocol toolkit), so this
# reference manifest points at the Face.works worked example for end-to-end validation. When
# /fw-stability emits ports for a real tenant project, they land at define/ — see §9.1.
runtime_ports:
  skills:
    manifest: "examples/face.works/runtime-ports/skill-manifest.yaml"
  memory:
    manifest: "examples/face.works/runtime-ports/memory-map.yaml"
  context:
    manifest: "examples/face.works/runtime-ports/context-manifest.yaml"
  connections:
    manifest: "examples/face.works/runtime-ports/integration-manifest.yaml"
  # v1.2.0 — harness-readable markdown bundle (derived view of the four port manifests).
  bundle:
    path: "examples/face.works/harness-bundle/"
